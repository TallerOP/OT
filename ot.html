<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial;background:#f2f2f2;margin:0;}
.box{max-width:500px;margin:auto;background:white;padding:15px;}
input,select,textarea{width:100%;padding:10px;margin-top:5px;border-radius:8px;border:1px solid #ccc;}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;}
</style>
</head>

<body>

<div class="box">

<select id="hora"></select>
<input id="maq">
<input id="proy">
<input id="tipo">
<textarea id="desc"></textarea>

<input id="emisor">
<input id="op1">
<input id="t1">

<textarea id="cerrar"></textarea>

<button onclick="guardar()">Guardar</button>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbyGuXys9T1o6vfBHU2WP8wmOSl5kx3zruwQSU0X0J3MrFnkKAVjpdSij1qPB_3q-oEz/exec";

window.onload=async()=>{

emisor.value=localStorage.emisor;
op1.value=localStorage.emisor;

const r=await fetch(`${API}?action=listas`);
const d=await r.json();

hora.innerHTML=d.HORA.map(x=>`<option>${x}</option>`);

const row=new URLSearchParams(location.search).get("row");

if(row){
const r2=await fetch(`${API}?action=getAviso&row=${row}`);
const a=await r2.json();

maq.value=a.maquina;
proy.value=a.proyecto;
tipo.value=a.tipo;
desc.value=a.descripcion;
}
};

async function guardar(){

const p=new URLSearchParams();

p.append("action","guardarOT");
p.append("hora",hora.value);
p.append("estado","ABIERTA");
p.append("emisor",emisor.value);
p.append("maquina",maq.value);
p.append("proyecto",proy.value);
p.append("tipo",tipo.value);
p.append("descripcion",desc.value);
p.append("cerrar",cerrar.value);
p.append("op1",op1.value);
p.append("t1",t1.value);

await fetch(API,{method:"POST",body:p});

alert("OK");
}

</script>

</body>
</html>
