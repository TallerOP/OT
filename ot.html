<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>OT</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{margin:0;font-family:Arial;background:#f2f2f2;}
#app{max-width:650px;margin:auto;background:white;padding:20px;}

label{font-weight:bold;display:block;margin-top:10px;}

input,select,textarea{
width:100%;padding:10px;margin-top:5px;border:1px solid #ccc;border-radius:8px;
}

button{
width:100%;padding:12px;margin-top:10px;border:none;border-radius:8px;font-weight:bold;
}

.btn-save{background:#2e7d32;color:white;}
.btn-back{background:#777;color:white;}
.btn-add{background:#1976d2;color:white;}

.operario{
border:1px solid #ddd;
padding:10px;
margin-top:10px;
border-radius:8px;
}

.hidden{display:none;}

</style>
</head>

<body>

<div id="app">

<button class="btn-back" onclick="back()">← Volver</button>

<h2>Orden de Trabajo</h2>

<label>Hora</label>
<select id="hora"></select>

<label>Máquina</label>
<input id="maq">

<label>Proyecto</label>
<input id="proy">

<label>Tipo avería</label>
<input id="tipo">

<label>Descripción</label>
<textarea id="desc"></textarea>

<label>Estado OT</label>
<select id="estado">
<option>ABIERTA</option>
<option>CERRADA</option>
</select>

<label>Emisor OT</label>
<input id="emisor" readonly>

<h3>Operarios</h3>

<div id="ops">
<div class="operario">
<label>Operario 1</label>
<input id="op1">
<label>Tiempo 1</label>
<input id="t1">
</div>
</div>

<button class="btn-add" onclick="addOp()">+ Añadir operario</button>

<label>Planificar acción</label>
<select id="plan" onchange="togglePlan()">
<option>NO</option>
<option>SI</option>
</select>

<div id="planBox" class="hidden">
<label>Descripción planificación</label>
<textarea id="planDesc"></textarea>
</div>

<label>Descripción cierre</label>
<textarea id="cerrar"></textarea>

<button class="btn-save" onclick="guardar()">Guardar OT</button>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxMt05y_qJVVfis5ViCfMQCWjSecdAHdaaKJL88fZjF7bKhW-GEtszfmPj-9a8QBASL/exec";

let opCount=1;

/* INIT */
window.onload=async()=>{

emisor.value=localStorage.getItem("emisor")||"";
op1.value=emisor.value;

/* cargar horas */
const r=await fetch(API+"?action=listas");
const d=await r.json();

hora.innerHTML=(d.HORA||[]).map(x=>`<option>${x}</option>`).join("");

/* cargar aviso si existe */
const row=new URLSearchParams(location.search).get("row");
if(row) loadAviso(row);

}

/* AVISO */
async function loadAviso(row){

const r=await fetch(API+"?action=getAviso&row="+row);
const d=await r.json();

maq.value=d.maquina||"";
proy.value=d.proyecto||"";
tipo.value=d.tipo||"";
desc.value=d.descripcion||"";
}

/* OPERARIOS */
function addOp(){
opCount++;
const div=document.createElement("div");
div.className="operario";
div.innerHTML=`
<label>Operario ${opCount}</label>
<input id="op${opCount}">
<label>Tiempo ${opCount}</label>
<input id="t${opCount}">
`;
ops.appendChild(div);
}

/* PLAN */
function togglePlan(){
planBox.classList.toggle("hidden", plan.value==="NO");
}

/* GUARDAR */
async function guardar(){

let data={
action:"guardarOT",
estado:estado.value,
emisor:emisor.value,
maquina:maq.value,
proyecto:proy.value,
tipo:tipo.value,
descripcion:desc.value,
cerrar:cerrar.value,
plan:plan.value,
planDesc:planDesc.value,
hora:hora.value
};

for(let i=1;i<=opCount;i++){
data["op"+i]=document.getElementById("op"+i)?.value||"";
data["t"+i]=document.getElementById("t"+i)?.value||"";
}

await fetch(API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});

alert("OT guardada correctamente");

}

/* BACK */
function back(){ window.location="index.html"; }

</script>

</body>
</html>
