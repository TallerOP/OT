<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial;background:#f2f2f2;margin:0;}
.box{max-width:500px;margin:auto;background:white;padding:15px;}
input,select,textarea{width:100%;padding:10px;margin-top:5px;border-radius:8px;border:1px solid #ccc;}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;}
</style>
</head>

<body>

<div class="box">

<label>Hora</label>
<select id="hora"></select>

<label>Máquina</label>
<input id="maq">

<label>Proyecto</label>
<input id="proy">

<label>Código avería</label>
<input id="tipo">

<label>Descripción crear</label>
<textarea id="desc"></textarea>

<label>Estado OT</label>
<select id="estado">
<option>ABIERTA</option>
<option>CERRADA</option>
</select>

<label>Emisor OT</label>
<input id="emisor">

<label>Operario 1</label>
<input id="op1">
<label>Tiempo 1</label>
<input id="t1">

<label>Material 1</label>
<input id="mat1">
<label>Material 2</label>
<input id="mat2">
<label>Material 3</label>
<input id="mat3">
<label>Material 4</label>
<input id="mat4">

<label>Tiempo intervención</label>
<input id="tint">

<label>Qtt1</label>
<input id="qtt1">

<label>Descripción cerrar</label>
<textarea id="cerrar"></textarea>

<label>Planificar acción</label>
<select id="plan">
<option>NO</option>
<option>SI</option>
</select>

<label>Descripción planificación</label>
<textarea id="planDesc"></textarea>

<label>Qtt2</label>
<input id="qtt2">
<label>Qtt3</label>
<input id="qtt3">
<label>Qtt4</label>
<input id="qtt4">

<button onclick="guardar()">Guardar OT</button>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbybqjljMrf5r3oRViGn1-XW8WVXp3ujk7Zs6u_1UgyTwMs0K3O-Iw5qiawHuigfaE-a/exec";

window.onload=async()=>{

emisor.value=localStorage.emisor;
op1.value=localStorage.emisor;

const r=await fetch(`${API}?action=listas`);
const d=await r.json();

hora.innerHTML=d.HORA.map(x=>`<option>${x}</option>`);

const row=new URLSearchParams(location.search).get("row");

if(row){
const r2=await fetch(`${API}?action=getAviso&row=${row}`);
const a=await r2.json();

maq.value=a.maquina;
proy.value=a.proyecto;
tipo.value=a.tipo;
desc.value=a.descripcion;
}else if(localStorage.tmp){

const t=JSON.parse(localStorage.tmp);

maq.value=t.maq;
proy.value=t.proy;
tipo.value=t.tipo;
desc.value=t.desc;
}
};

async function guardar(){

const p=new URLSearchParams();

[
"hora","estado","emisor","maquina","proyecto","tipo","descripcion",
"cerrar","plan","planDesc",
"op1","t1",
"mat1","mat2","mat3","mat4",
"tint",
"qtt1","qtt2","qtt3","qtt4"
].forEach(id=>p.append(id,document.getElementById(id)?.value||""));

p.append("action","guardarOT");

await fetch(API,{method:"POST",body:p});

alert("OT guardada");
}

</script>

</body>
</html>
