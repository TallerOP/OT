<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:url("op.png") center/cover no-repeat fixed;
}

.overlay{
background:rgba(255,255,255,0.94);
min-height:100vh;
padding:15px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:15px;
border-radius:12px;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:1px solid #ccc;
box-sizing:border-box;
}

.row{
display:flex;
gap:5px;
}

.row input{
flex:1;
}

.qtt{
flex:0.3;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
font-weight:bold;
}

.add{background:#1976d2;color:white;}
.save{background:#2e7d32;color:white;}
</style>
</head>

<body>

<div class="overlay">
<div class="container">

<h2>Orden de Trabajo</h2>

<label>Hora</label>
<select id="hora"></select>

<label>Máquina</label>
<select id="maq"></select>

<label>Proyecto</label>
<select id="proy"></select>

<label>Avería</label>
<select id="tipo"></select>

<label>Descripción</label>
<textarea id="desc"></textarea>

<label>Estado</label>
<select id="estado">
<option>ABIERTA</option>
<option>CERRADA</option>
</select>

<label>Emisor</label>
<input id="emisor">

<div id="ops"></div>
<button class="add" onclick="addOp()">+ Operario</button>

<div id="mats"></div>
<button class="add" onclick="addMat()">+ Material</button>

<label>Tiempo intervención</label>
<input id="tint">

<label>Descripción cierre</label>
<textarea id="cerrar"></textarea>

<label>Planificar</label>
<select id="plan" onchange="togglePlan()">
<option>NO</option>
<option>SI</option>
</select>

<div id="planBox" style="display:none">
<label>Descripción planificación</label>
<textarea id="planDesc"></textarea>
</div>

<button class="save" onclick="guardar()">Guardar OT</button>

</div>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzuXgBkEX73jzhOzbYs_ibS-bz2_aPr2end7fKWZRdnf3sCc35l8uS8Cvj_iWxjCv7Q/exec";

let opCount=0;
let matCount=0;

window.onload=async()=>{

emisor.value=localStorage.emisor;
addOp();
addMat();

const r=await fetch(`${API}?action=listas`);
const d=await r.json();

hora.innerHTML=d.HORA.map(x=>`<option>${x}</option>`).join("");
maq.innerHTML=d.MAQUINA.map(x=>`<option>${x}</option>`).join("");
proy.innerHTML=d.PROYECTO.map(x=>`<option>${x}</option>`).join("");
tipo.innerHTML=d.AVERIA.map(x=>`<option>${x}</option>`).join("");

const row=new URLSearchParams(location.search).get("row");

if(row){
const r2=await fetch(`${API}?action=getAviso&row=${row}`);
const a=await r2.json();

maq.value=a.maquina;
proy.value=a.proyecto;
tipo.value=a.tipo;
desc.value=a.descripcion;
}else if(localStorage.tmp){

const t=JSON.parse(localStorage.tmp);

maq.value=t.maq;
proy.value=t.proy;
tipo.value=t.tipo;
desc.value=t.desc;
}
};

/* OPERARIOS */
function addOp(){
if(opCount>=6) return;
opCount++;

ops.innerHTML+=`
<div class="row">
<input id="op${opCount}" placeholder="Operario ${opCount}">
<input id="t${opCount}" placeholder="Tiempo ${opCount}">
</div>`;
}

/* MATERIALES */
function addMat(){
if(matCount>=4) return;
matCount++;

mats.innerHTML+=`
<div class="row">
<input id="mat${matCount}" placeholder="Material ${matCount}">
<input id="qtt${matCount}" class="qtt" placeholder="Qtt">
</div>`;
}

/* PLAN */
function togglePlan(){
planBox.style.display = plan.value==="SI" ? "block":"none";
}

/* GUARDAR */
async function guardar(){

const p=new URLSearchParams();

p.append("action","guardarOT");
p.append("hora",hora.value);
p.append("estado",estado.value);
p.append("emisor",emisor.value);
p.append("maquina",maq.value);
p.append("proyecto",proy.value);
p.append("tipo",tipo.value);
p.append("descripcion",desc.value);
p.append("cerrar",cerrar.value);
p.append("plan",plan.value);
p.append("planDesc",planDesc.value);
p.append("tint",tint.value);

for(let i=1;i<=opCount;i++){
p.append("op"+i,document.getElementById("op"+i).value);
p.append("t"+i,document.getElementById("t"+i).value);
}

for(let i=1;i<=matCount;i++){
p.append("mat"+i,document.getElementById("mat"+i).value);
p.append("qtt"+i,document.getElementById("qtt"+i).value);
}

await fetch(API,{method:"POST",body:p});

/* 🔥 VUELVE CON SESIÓN */
location="index.html";
}

</script>

</body>
</html>
