<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>OT Industrial</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

#app{
max-width:600px;
margin:auto;
background:white;
padding:20px;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:6px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
font-weight:bold;
}

.btn-save{background:#2e7d32;color:white;}
.btn-back{background:#777;color:white;}

</style>
</head>

<body>

<div id="app">

<h2>Orden de Trabajo</h2>

<button class="btn-back" onclick="back()">← Volver</button>

<input id="maq">
<input id="proy">
<input id="tipo">
<textarea id="desc"></textarea>

<select id="estado">
<option>ABIERTA</option>
<option>CERRADA</option>
</select>

<input id="emisor" readonly>

<input id="op1">
<input id="t1">

<textarea id="cerrar" placeholder="Descripción cierre"></textarea>

<select id="plan">
<option>NO</option>
<option>SI</option>
</select>

<textarea id="planDesc" placeholder="Planificación"></textarea>

<button class="btn-save" onclick="guardar()">Guardar OT</button>

</div>

<script>

const API="TU_URL_AQUI";

let EMISOR="";

/* INIT */
window.onload=async()=>{

const row=new URLSearchParams(location.search).get("row");

const r=await fetch(API+"?action=session");
const d=await r.json();

EMISOR=d.emisor;

emisor.value=EMISOR;
op1.value=EMISOR;

if(row) loadAviso(row);
}

/* AVISO */
async function loadAviso(row){

const r=await fetch(API+"?action=getAviso&row="+row);
const d=await r.json();

maq.value=d.maquina||"";
proy.value=d.proyecto||"";
tipo.value=d.tipo||"";
desc.value=d.descripcion||"";
}

/* GUARDAR */
async function guardar(){

await fetch(API,{
method:"POST",
body:JSON.stringify({
action:"guardarOT",
maquina:maq.value,
proyecto:proy.value,
tipo:tipo.value,
descripcion:desc.value,
estado:estado.value,
emisor:emisor.value,
op1:op1.value,
t1:t1.value,
cerrar:cerrar.value,
plan:plan.value,
planDesc:planDesc.value
})
});

alert("OT guardada");
}

/* BACK */
function back(){
window.location="index.html";
}

</script>

</body>
</html>
