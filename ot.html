<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Orden de Trabajo</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

#app{
max-width:650px;
margin:auto;
background:white;
padding:20px;
box-sizing:border-box;
}

/* TITULOS */
h2,h3{
margin-top:10px;
}

/* LABELS */
label{
display:block;
margin-top:10px;
font-weight:bold;
font-size:14px;
}

/* INPUTS */
input,select,textarea{
width:100%;
padding:12px;
margin-top:5px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
font-size:15px;
}

/* BOTONES */
button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.btn-save{background:#2e7d32;color:white;}
.btn-back{background:#777;color:white;}
.btn-add{background:#1976d2;color:white;color:white;}

.operario{
border:1px solid #ddd;
padding:10px;
margin-top:10px;
border-radius:8px;
background:#fafafa;
}

/* PLANIFICACIÓN */
.hidden{display:none;}

</style>
</head>

<body>

<div id="app">

<button class="btn-back" onclick="back()">← Volver</button>

<h2>Orden de Trabajo</h2>

<!-- DATOS PRINCIPALES -->
<label>Máquina</label>
<input id="maq">

<label>Proyecto</label>
<input id="proy">

<label>Tipo de avería</label>
<input id="tipo">

<label>Descripción</label>
<textarea id="desc"></textarea>

<!-- ESTADO -->
<label>Estado OT</label>
<select id="estado">
<option>ABIERTA</option>
<option>CERRADA</option>
</select>

<!-- EMISOR -->
<label>Emisor OT</label>
<input id="emisor" readonly>

<hr>

<h3>Operarios</h3>

<div id="ops">

<div class="operario">
<label>Operario 1</label>
<input id="op1">

<label>Tiempo 1</label>
<input id="t1">
</div>

</div>

<button class="btn-add" onclick="addOp()">+ Añadir operario</button>

<hr>

<!-- PLANIFICACIÓN -->
<label>Planificar acción</label>
<select id="plan" onchange="togglePlan()">
<option value="NO">NO</option>
<option value="SI">SI</option>
</select>

<div id="planBox" class="hidden">

<label>Descripción planificación</label>
<textarea id="planDesc"></textarea>

</div>

<!-- CIERRE -->
<label>Descripción cierre</label>
<textarea id="cerrar"></textarea>

<button class="btn-save" onclick="guardar()">Guardar OT</button>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbz7faraOb80Glef8kxPNoEU09EA2v7s5AO6OHJ3ToJBVfUyjMAaz3vP_Mn4L2jgG5iy/exec";

let EMISOR="";
let opCount=1;

/* ================= INIT ================= */
window.onload=async()=>{

const r=await fetch(API+"?action=session");
const d=await r.json();

EMISOR=d.emisor;

emisor.value=EMISOR;
op1.value=EMISOR;

/* si viene desde aviso */
const row=new URLSearchParams(location.search).get("row");

if(row) loadAviso(row);
}

/* ================= CARGAR AVISO ================= */
async function loadAviso(row){

const r=await fetch(API+"?action=getAviso&row="+row);
const d=await r.json();

maq.value=d.maquina||"";
proy.value=d.proyecto||"";
tipo.value=d.tipo||"";
desc.value=d.descripcion||"";
}

/* ================= AÑADIR OPERARIO ================= */
function addOp(){

opCount++;

const div=document.createElement("div");
div.className="operario";

div.innerHTML=`
<label>Operario ${opCount}</label>
<input id="op${opCount}">

<label>Tiempo ${opCount}</label>
<input id="t${opCount}">
`;

ops.appendChild(div);
}

/* ================= PLANIFICACIÓN ================= */
function togglePlan(){

if(plan.value==="SI"){
planBox.classList.remove("hidden");
}else{
planBox.classList.add("hidden");
}

}

/* ================= GUARDAR OT ================= */
async function guardar(){

let data={
action:"guardarOT",
maquina:maq.value,
proyecto:proy.value,
tipo:tipo.value,
descripcion:desc.value,
estado:estado.value,
emisor:emisor.value,
plan:plan.value,
planDesc:planDesc.value,
cerrar:cerrar.value
};

/* operarios dinámicos */
for(let i=1;i<=opCount;i++){
data["op"+i]=document.getElementById("op"+i)?.value||"";
data["t"+i]=document.getElementById("t"+i)?.value||"";
}

/* POST CORRECTO */
await fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
});

alert("OT guardada correctamente");

}

/* ================= BACK ================= */
function back(){
window.location="index.html";
}

</script>

</body>
</html>
