<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema OT</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: url("op.png") no-repeat center center fixed;
  background-size: cover;
}

.overlay {
  min-height: 100vh;
  background: rgba(255,255,255,0.92);
  padding: 15px;
  box-sizing: border-box;
}

/* ================= LOGOUT FIX REAL ================= */
#logoutBtn {
  position: fixed;
  top: 10px;
  right: 10px;
  z-index: 9999;

  width: auto !important;
  padding: 8px 12px;

  border: none;
  border-radius: 8px;
  background: #c62828;
  color: white;
  font-weight: bold;
  font-size: 13px;

  cursor: pointer;
  display: none;
}

/* ================= CONTENEDORES ================= */
#loginBox, #app {
  max-width: 450px;
  margin: 60px auto;
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

/* ================= TITULOS ================= */
h2, h3 { text-align:center; }

/* ================= CAMPOS ================= */
label {
  display:block;
  margin-top: 12px;
  font-weight: bold;
}

input, select, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 5px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 16px;
  box-sizing: border-box;
}

/* ================= BOTONES ================= */
button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

.btn-ok { background:#1976d2; color:white; }
.btn-secondary { background:#555; color:white; }

/* ================= AVISOS ================= */
.card {
  background: #fafafa;
  border: 1px solid #ddd;
  border-radius: 10px;
  padding: 10px;
  margin-top: 10px;
}

.card button {
  width: 48%;
}

</style>
</head>

<body>

<!-- 🔴 LOGOUT FIX -->
<button id="logoutBtn" onclick="logout()">Cerrar sesión</button>

<div class="overlay">

<!-- LOGIN -->
<div id="loginBox">
  <h2>Acceso Sistema OT</h2>

  <label>Usuario</label>
  <input id="user">

  <label>Password</label>
  <input id="pass" type="password">

  <button class="btn-ok" onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

  <h2>Generar Aviso</h2>

  <label>Máquina</label>
  <select id="maq"></select>

  <label>Proyecto</label>
  <select id="proy"></select>

  <label>Tipo de Avería</label>
  <select id="tipo"></select>

  <label>Descripción</label>
  <textarea id="desc"></textarea>

  <button class="btn-ok" onclick="crearAviso()">Generar Aviso</button>

  <button id="btnOT" class="btn-secondary" onclick="goOT()">Generar OT</button>

  <h3>Avisos pendientes</h3>
  <div id="avisos"></div>

</div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbx-xpq3eFe_TzggjI7u0ZG8crrpZZo_PZYhlquQGEParVor6VRnYpN0ngEz-b4r6ZU8/exec";

let USER = "";
let EMISOR = "";

/* ================= LOGIN ================= */
async function login() {

  const u = user.value;
  const p = pass.value;

  const res = await fetch(`${API}?action=login&user=${encodeURIComponent(u)}&pass=${encodeURIComponent(p)}`);
  const data = await res.json();

  if (!data.ok) {
    alert("Login incorrecto");
    return;
  }

  USER = u;
  EMISOR = data.emisor;

  loginBox.style.display = "none";
  app.style.display = "block";

  /* mostrar logout */
  document.getElementById("logoutBtn").style.display = "block";

  /* roles */
  if (USER.toLowerCase() === "produccion") {
    document.getElementById("btnOT").style.display = "none";
  }

  loadLists();
  loadAvisos();
}

/* ================= LOGOUT ================= */
function logout() {

  USER = "";
  EMISOR = "";

  loginBox.style.display = "block";
  app.style.display = "none";

  document.getElementById("logoutBtn").style.display = "none";

  user.value = "";
  pass.value = "";
}

/* ================= RESTO SIN CAMBIOS ================= */

async function loadLists() {
  const res = await fetch(API + "?action=listas");
  const data = await res.json();

  fill("maq", data.MAQUINA);
  fill("proy", data.PROYECTO);
  fill("tipo", data.AVERIA);
}

function fill(id, arr) {
  const sel = document.getElementById(id);
  sel.innerHTML = "";
  (arr || []).forEach(v => {
    const o = document.createElement("option");
    o.value = v;
    o.text = v;
    sel.add(o);
  });
}

async function crearAviso() {

  const url = new URL(API);

  url.searchParams.append("action", "crearAviso");
  url.searchParams.append("id", "AV-" + Date.now());
  url.searchParams.append("usuario", USER);
  url.searchParams.append("maquina", maq.value);
  url.searchParams.append("proyecto", proy.value);
  url.searchParams.append("tipo", tipo.value);
  url.searchParams.append("descripcion", desc.value);

  const res = await fetch(url);
  const data = await res.json();

  if (data.ok) {
    alert("Aviso creado correctamente");
    desc.value = "";
    loadAvisos();
  }
}

async function loadAvisos() {

  const res = await fetch(API + "?action=avisos");
  const data = await res.json();

  avisos.innerHTML = "";

  const isProd = USER.toLowerCase() === "produccion";

  (data || []).forEach(a => {

    avisos.innerHTML += `
      <div class="card">
        <b>${a.maquina}</b><br>
        ${a.descripcion}<br>

        ${
          !isProd
          ? `<button class="btn-ok" onclick="convertir('${a.row}')">Convertir a OT</button>`
          : ""
        }

        <button class="btn-secondary" onclick="rechazar('${a.row}')">Rechazar Aviso</button>
      </div>
    `;
  });
}

async function rechazar(row) {
  await fetch(API + "?action=rechazarAviso&row=" + row);
  loadAvisos();
}

function convertir(row) {
  window.location.href = "ot.html?row=" + row;
}

function goOT() {
  window.location.href = "ot.html";
}

</script>

</body>
</html>
