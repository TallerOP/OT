<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión OT</title>

<style>

body{
margin:0;
font-family:Arial;
background:url("op.png") center/cover no-repeat fixed;
}

.overlay{
background:rgba(255,255,255,0.94);
min-height:100vh;
padding:15px;
}

.container{
max-width:500px;
margin:auto;
}

/* LOGIN */
#loginBox{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.2);
margin-top:40px;
}

/* APP */
#app{display:none;}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
}

/* BOTÓN PEQUEÑO */
.logout{
background:#d32f2f;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
font-size:12px;
width:auto;
}

/* CAMPOS */
label{
display:block;
margin-top:10px;
font-weight:bold;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:1px solid #ccc;
box-sizing:border-box;
}

/* BOTONES */
button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
font-weight:bold;
}

.btn-aviso{background:#2e7d32;color:white;}
.btn-ot{background:#1976d2;color:white;}
.btn-del{background:#616161;color:white;}

/* TARJETAS */
.card{
background:white;
padding:12px;
margin-top:10px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

</style>
</head>

<body>

<div class="overlay">
<div class="container">

<!-- LOGIN -->
<div id="loginBox">
<h2>Login</h2>

<label>Usuario</label>
<input id="user">

<label>Password</label>
<input id="pass" type="password">

<button onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="app">

<div class="header">
<h2>Gestión OT</h2>
<button class="logout" onclick="logout()">Cerrar sesión</button>
</div>

<label>Máquina</label>
<select id="maq"></select>

<label>Proyecto</label>
<select id="proy"></select>

<label>Tipo Avería</label>
<select id="tipo"></select>

<label>Descripción</label>
<textarea id="desc"></textarea>

<button class="btn-aviso" onclick="crearAviso()">Generar Aviso</button>
<button class="btn-ot" onclick="generarOT()">Generar OT</button>

<hr>

<h3>Avisos pendientes</h3>
<div id="avisos"></div>

</div>

</div>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbxKW2ayMcsmlFIUs76wjKDCnBHarYYT64GAky-Vw7eCSyba-yMR-GLe6hvyIYscxsUg/exec";

/* LOGIN */
async function login(){

const r = await fetch(`${API}?action=login&user=${user.value}&pass=${pass.value}`);
const d = await r.json();

if(!d.ok){
alert("Login incorrecto");
return;
}

localStorage.user = user.value;
localStorage.emisor = d.emisor;

loginBox.style.display="none";
app.style.display="block";

cargarListas();
cargarAvisos();
}

/* LISTAS */
async function cargarListas(){

const r = await fetch(`${API}?action=listas`);
const d = await r.json();

maq.innerHTML = d.MAQUINA.map(x=>`<option>${x}</option>`).join("");
proy.innerHTML = d.PROYECTO.map(x=>`<option>${x}</option>`).join("");
tipo.innerHTML = d.AVERIA.map(x=>`<option>${x}</option>`).join("");
}

/* CREAR AVISO */
async function crearAviso(){

await fetch(API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
action:"crearAviso",
usuario:localStorage.user,
maquina:maq.value,
proyecto:proy.value,
tipo:tipo.value,
descripcion:desc.value
})
});

desc.value="";
cargarAvisos();
}

/* AVISOS */
async function cargarAvisos(){

const r = await fetch(`${API}?action=avisos`);
const d = await r.json();

avisos.innerHTML="";

d.forEach(a=>{
avisos.innerHTML+=`
<div class="card">
<b>${a.maquina}</b><br>${a.descripcion}
<button class="btn-ot" onclick="convertir(${a.row})">Convertir a OT</button>
<button class="btn-del" onclick="rechazar(${a.row})">Eliminar aviso</button>
</div>`;
});
}

/* ACCIONES */
function generarOT(){

localStorage.tmp = JSON.stringify({
maq:maq.value,
proy:proy.value,
tipo:tipo.value,
desc:desc.value
});

window.location="ot.html";
}

async function convertir(row){
await fetch(`${API}?action=convertirAviso&row=${row}`);
window.location=`ot.html?row=${row}`;
}

async function rechazar(row){
await fetch(`${API}?action=rechazarAviso&row=${row}&user=${localStorage.user}`);
cargarAvisos();
}

function logout(){
localStorage.clear();
location.reload();
}

</script>

</body>
</html>
