<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sistema OT</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    #app { display: none; }
    .card { border: 1px solid #ccc; padding: 10px; margin: 8px 0; }
    button { margin-top: 5px; }
  </style>
</head>

<body>

<!-- ================= LOGIN ================= -->
<div id="loginBox">
  <h2>Login</h2>

  <input id="user" placeholder="Usuario"><br><br>
  <input id="pass" type="password" placeholder="Password"><br><br>

  <button onclick="login()">Entrar</button>
</div>

<!-- ================= APP ================= -->
<div id="app">

  <h2>Generar Aviso / OT</h2>

  <select id="maq"></select>
  <select id="proy"></select>
  <select id="tipo"></select>
  <select id="hora"></select>

  <br><br>

  <textarea id="desc" placeholder="Descripción"></textarea><br><br>

  <button onclick="crearAviso()">Generar Aviso</button>
  <button onclick="irOT()">Generar OT</button>

  <h3>Avisos pendientes</h3>
  <div id="avisos"></div>

</div>

<script>

// ======================================================
// 🔴 CAMBIA ESTO POR TU URL REAL DE APPS SCRIPT
// ======================================================
const API_URL = "https://script.google.com/macros/s/AKfycbwTL8T_ab1qIBYQquunWZlsF19KN3GGGmr5knAFNd77yXkG-KWIG7Y2J-lM-nBjIXnG/exec";

let USER = "";
let EMISOR = "";
let PUEDE_OT = false;

// ======================================================
// LOGIN
// ======================================================
async function login() {

  const u = user.value;
  const p = pass.value;

  const res = await fetch(`${API_URL}?action=login&user=${u}&pass=${p}`);
  const data = await res.json();

  if (!data.ok) {
    alert("Login incorrecto");
    return;
  }

  USER = u;
  EMISOR = data.emisor;

  loginBox.style.display = "none";
  app.style.display = "block";

  loadLists();
  loadAvisos();
}

// ======================================================
// LISTAS
// ======================================================
async function loadLists() {

  const res = await fetch(`${API_URL}?action=listas`);
  const data = await res.json();

  fill("maq", data.MAQUINA);
  fill("proy", data.PROYECTO);
  fill("tipo", data.AVERIA);
  fill("hora", data.HORA);
}

function fill(id, arr) {

  const sel = document.getElementById(id);
  sel.innerHTML = "";

  arr.forEach(v => {
    const o = document.createElement("option");
    o.value = v;
    o.text = v;
    sel.add(o);
  });
}

// ======================================================
// CREAR AVISO
// ======================================================
async function crearAviso() {

  const body = {
    id: "AV-" + Date.now(),
    usuario: USER,
    maquina: maq.value,
    proyecto: proy.value,
    tipo: tipo.value,
    descripcion: desc.value
  };

  await fetch(API_URL + "?action=crearAviso", {
    method: "POST",
    body: JSON.stringify(body)
  });

  alert("Aviso creado");
  desc.value = "";
  loadAvisos();
}

// ======================================================
// AVISOS
// ======================================================
async function loadAvisos() {

  const res = await fetch(`${API_URL}?action=avisos`);
  const data = await res.json();

  avisos.innerHTML = "";

  data.forEach(a => {

    avisos.innerHTML += `
      <div class="card">
        <b>${a.maquina}</b><br>
        ${a.descripcion}<br><br>

        <button onclick="rechazar('${a.id}')">Rechazar</button>
        <button onclick="convertir('${a.id}')">Convertir OT</button>
      </div>
    `;
  });
}

// ======================================================
// RECHAZAR
// ======================================================
async function rechazar(id) {

  await fetch(API_URL + "?action=rechazarAviso&id=" + id);

  loadAvisos();
}

// ======================================================
// CONVERTIR OT
// ======================================================
async function convertir(id) {

  await fetch(API_URL + "?action=crearOT&id=" + id + "&emisor=" + EMISOR);

  alert("OT creada");
  loadAvisos();
}

// ======================================================
// IR OT (futuro formulario)
// ======================================================
function irOT() {
  alert("Aquí irá el formulario OT completo");
}

</script>

</body>
</html>
