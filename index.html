<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema OT</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:url("op.png") no-repeat center center fixed;
background-size:cover;
}

.overlay{
min-height:100vh;
background:rgba(255,255,255,0.92);
padding:15px;
box-sizing:border-box;
}

/* LOGIN */
#loginBox{
max-width:400px;
margin:80px auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

/* APP */
#app{
display:none;
max-width:650px;
margin:auto;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
}

/* INPUTS */
input,select,textarea{
width:100%;
padding:12px;
margin-top:6px;
border-radius:8px;
border:1px solid #ccc;
box-sizing:border-box;
}

/* BUTTONS */
button{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.btn-aviso{background:#2e7d32;color:white;}
.btn-ot{background:#1976d2;color:white;}
.btn-del{background:#616161;color:white;}
.logout{background:#c62828;color:white;}

.card{
background:white;
padding:12px;
margin-top:10px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.hidden{display:none;}

</style>
</head>

<body>

<div class="overlay">

<!-- LOGIN RESTAURADO -->
<div id="loginBox">
<h2>Login</h2>

<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="app">

<div class="header">
<h2>Sistema OT</h2>
<button class="logout" onclick="logout()">Cerrar sesión</button>
</div>

<h3>Generar Aviso</h3>

<select id="maq"></select>
<select id="proy"></select>
<select id="tipo"></select>

<textarea id="desc"></textarea>

<button class="btn-aviso" onclick="crearAviso()">Generar Aviso</button>

<button id="btnOT" class="btn-ot" onclick="goOT()">Generar OT</button>

<hr>

<h3>Avisos pendientes</h3>
<div id="avisos"></div>

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbz7faraOb80Glef8kxPNoEU09EA2v7s5AO6OHJ3ToJBVfUyjMAaz3vP_Mn4L2jgG5iy/exec";

let USER="";
let EMISOR="";
let ROL="";

/* ================= LOGIN REAL ================= */
async function login(){

const r=await fetch(API+"?action=login&user="+user.value+"&pass="+pass.value);
const d=await r.json();

if(!d.ok){
alert("Login incorrecto");
return;
}

USER=user.value;
EMISOR=d.emisor;
ROL=user.value.toLowerCase();

loginBox.style.display="none";
app.style.display="block";

/* PRODUCCIÓN SIN OT */
if(ROL==="produccion"){
document.getElementById("btnOT").style.display="none";
}

loadLists();
loadAvisos();
}

/* LISTAS */
async function loadLists(){

const r=await fetch(API+"?action=listas");
const d=await r.json();

maq.innerHTML=d.MAQUINA.map(x=>`<option>${x}</option>`).join("");
proy.innerHTML=d.PROYECTO.map(x=>`<option>${x}</option>`).join("");
tipo.innerHTML=d.AVERIA.map(x=>`<option>${x}</option>`).join("");
}

/* AVISO */
async function crearAviso(){

await fetch(API,{
method:"POST",
body:JSON.stringify({
action:"crearAviso",
usuario:USER,
maquina:maq.value,
proyecto:proy.value,
tipo:tipo.value,
descripcion:desc.value
})
});

desc.value="";
loadAvisos();
}

/* AVISOS */
async function loadAvisos(){

const r=await fetch(API+"?action=avisos");
const d=await r.json();

avisos.innerHTML="";

d.forEach(a=>{

avisos.innerHTML+=`
<div class="card">
<b>${a.maquina}</b><br>
${a.descripcion}<br>

<button class="btn-ot" onclick="convertir(${a.row})">Convertir a OT</button>
<button class="btn-del" onclick="eliminar(${a.row})">Eliminar aviso</button>
</div>
`;

});

}

/* OT */
function goOT(){
window.location="ot.html";
}

/* CONVERTIR */
async function convertir(row){

await fetch(API+"?action=convertirAviso&row="+row);

window.location="ot.html?row="+row;
}

/* ELIMINAR */
async function eliminar(row){

await fetch(API+"?action=rechazarAviso&row="+row+"&user="+USER);

loadAvisos();
}

/* LOGOUT */
function logout(){
location.reload();
}

</script>

</body>
</html>
