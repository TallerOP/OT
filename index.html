<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema OT</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:url("op.png") no-repeat center center fixed;
background-size:cover;
}

.overlay{
min-height:100vh;
background:rgba(255,255,255,0.94);
padding:12px;
box-sizing:border-box;
}

/* LOGIN */
#loginBox{
max-width:360px;
margin:60px auto;
background:white;
padding:18px;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

/* APP */
#app{
display:none;
max-width:650px;
margin:auto;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
}

/* LABELS */
label{
display:block;
margin-top:10px;
font-weight:bold;
font-size:14px;
color:#333;
}

/* INPUTS */
input,select,textarea{
width:100%;
padding:12px;
margin-top:5px;
border-radius:8px;
border:1px solid #ccc;
box-sizing:border-box;
font-size:15px;
}

/* BUTTONS */
button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.btn-aviso{background:#2e7d32;color:white;}
.btn-ot{background:#1976d2;color:white;}
.btn-del{background:#616161;color:white;}

.card{
background:white;
padding:12px;
margin-top:10px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.logout{
background:#c62828;color:white;
border:none;
padding:8px 12px;
border-radius:8px;
}

</style>
</head>

<body>

<div class="overlay">

<!-- LOGIN -->
<div id="loginBox">
<h2>Login</h2>

<label>Usuario</label>
<input id="user">

<label>Password</label>
<input id="pass" type="password">

<button onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="app">

<div class="header">
<h2>Sistema OT</h2>
<button class="logout" onclick="logout()">Salir</button>
</div>

<h3>Generar Aviso</h3>

<label>Máquina</label>
<select id="maq"></select>

<label>Proyecto</label>
<select id="proy"></select>

<label>Tipo de avería</label>
<select id="tipo"></select>

<label>Descripción</label>
<textarea id="desc"></textarea>

<button class="btn-aviso" onclick="crearAviso()">Generar Aviso</button>

<button id="btnOT" class="btn-ot" onclick="goOT()">Generar OT</button>

<hr>

<h3>Avisos pendientes</h3>
<div id="avisos"></div>

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxAkfiAJkwdHRV_xIpCu46Xk7U8JXgRs9rzcy3hyVzjMQFfUY84hdF7q0ZzXcdPzdnO/exec";

let USER="";
let EMISOR="";
let ROL="";

async function login(){

const r=await fetch(API+"?action=login&user="+user.value+"&pass="+pass.value);
const d=await r.json();

if(!d.ok){
alert("Login incorrecto");
return;
}

USER=user.value;
EMISOR=d.emisor;
ROL=user.value.toLowerCase();

loginBox.style.display="none";
app.style.display="block";

if(ROL==="produccion"){
btnOT.style.display="none";
}

loadLists();
loadAvisos();
}

async function loadLists(){

const r=await fetch(API+"?action=listas");
const d=await r.json();

maq.innerHTML=d.MAQUINA.map(x=>`<option>${x}</option>`).join("");
proy.innerHTML=d.PROYECTO.map(x=>`<option>${x}</option>`).join("");
tipo.innerHTML=d.AVERIA.map(x=>`<option>${x}</option>`).join("");
}

async function crearAviso(){

await fetch(API,{
method:"POST",
body:JSON.stringify({
action:"crearAviso",
usuario:USER,
maquina:maq.value,
proyecto:proy.value,
tipo:tipo.value,
descripcion:desc.value
})
});

desc.value="";
loadAvisos();
}

async function loadAvisos(){

const r=await fetch(API+"?action=avisos");
const d=await r.json();

avisos.innerHTML="";

d.forEach(a=>{

avisos.innerHTML+=`
<div class="card">
<b>${a.maquina}</b><br>
${a.descripcion}<br>

<button class="btn-ot" onclick="convertir(${a.row})">Convertir a OT</button>
<button class="btn-del" onclick="eliminar(${a.row})">Eliminar aviso</button>
</div>`;
});
}

function goOT(){
window.location="ot.html";
}

async function convertir(row){
await fetch(API+"?action=convertirAviso&row="+row);
window.location="ot.html?row="+row;
}

async function eliminar(row){
await fetch(API+"?action=rechazarAviso&row="+row+"&user="+USER);
loadAvisos();
}

function logout(){
location.reload();
}

</script>

</body>
</html>
