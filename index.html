<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial;margin:0;background:url("op.png") center/cover fixed;}
.wrap{background:rgba(255,255,255,0.95);min-height:100vh;padding:15px;}
.box{max-width:500px;margin:auto;}
input,select,textarea{width:100%;padding:10px;margin-top:5px;border-radius:8px;border:1px solid #ccc;}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;font-weight:bold;}
.aviso{background:#2e7d32;color:white;}
.ot{background:#1976d2;color:white;}
.del{background:#616161;color:white;}
</style>
</head>

<body>

<div class="wrap">
<div class="box">

<div id="login">
<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Entrar</button>
</div>

<div id="app" style="display:none">

<select id="maq"></select>
<select id="proy"></select>
<select id="tipo"></select>
<textarea id="desc"></textarea>

<button class="aviso" onclick="crearAviso()">Aviso</button>
<button class="ot" onclick="irOT()">OT</button>

<div id="avisos"></div>

</div>
</div>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbyGuXys9T1o6vfBHU2WP8wmOSl5kx3zruwQSU0X0J3MrFnkKAVjpdSij1qPB_3q-oEz/exec";

async function login(){
const r=await fetch(`${API}?action=login&user=${user.value}&pass=${pass.value}`);
const d=await r.json();
if(!d.ok){alert("Error");return;}

localStorage.user=user.value;
localStorage.emisor=d.emisor;

login.style.display="none";
app.style.display="block";

load();
}

async function load(){
const r=await fetch(`${API}?action=listas`);
const d=await r.json();

maq.innerHTML=d.MAQUINA.map(x=>`<option>${x}</option>`);
proy.innerHTML=d.PROYECTO.map(x=>`<option>${x}</option>`);
tipo.innerHTML=d.AVERIA.map(x=>`<option>${x}</option>`);

loadAvisos();
}

async function crearAviso(){

const p=new URLSearchParams();
p.append("action","crearAviso");
p.append("usuario",localStorage.user);
p.append("maquina",maq.value);
p.append("proyecto",proy.value);
p.append("tipo",tipo.value);
p.append("descripcion",desc.value);

await fetch(API,{method:"POST",body:p});

desc.value="";
loadAvisos();
}

async function loadAvisos(){
const r=await fetch(`${API}?action=avisos`);
const d=await r.json();

avisos.innerHTML="";
d.forEach(a=>{
avisos.innerHTML+=`
<div>
${a.maquina}<br>${a.descripcion}
<button onclick="conv(${a.row})">OT</button>
<button onclick="del(${a.row})">X</button>
</div>`;
});
}

function irOT(){
localStorage.tmp=JSON.stringify({
maq:maq.value,
proy:proy.value,
tipo:tipo.value,
desc:desc.value
});
location="ot.html";
}

async function conv(r){
await fetch(`${API}?action=convertirAviso&row=${r}`);
location=`ot.html?row=${r}`;
}

async function del(r){
await fetch(`${API}?action=rechazarAviso&row=${r}&user=${localStorage.user}`);
loadAvisos();
}
</script>

</body>
</html>
