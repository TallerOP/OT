<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sistema OT</title>

  <style>
    body { font-family: Arial; padding: 20px; }
    #app { display:none; }
    .card { border:1px solid #ccc; padding:10px; margin:10px 0; }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <h2>Login</h2>
  <input id="user" placeholder="Usuario"><br><br>
  <input id="pass" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="app">

  <h2>Generar Aviso</h2>

  <select id="maq"></select>
  <select id="proy"></select>
  <select id="tipo"></select>

  <br><br>

  <textarea id="desc" placeholder="Descripción"></textarea><br><br>

  <button onclick="crearAviso()">Generar Aviso</button>

  <h3>Avisos pendientes</h3>
  <div id="avisos"></div>

</div>

<script>

// 🔴 TU URL REAL DE APPS SCRIPT
const API = "https://script.google.com/macros/s/AKfycbx-xpq3eFe_TzggjI7u0ZG8crrpZZo_PZYhlquQGEParVor6VRnYpN0ngEz-b4r6ZU8/exec";

let USER = "";
let EMISOR = "";

// ================= LOGIN =================
async function login() {

  const res = await fetch(`${API}?action=login&user=${user.value}&pass=${pass.value}`);
  const data = await res.json();

  if (!data.ok) {
    alert("Login incorrecto");
    return;
  }

  USER = user.value;
  EMISOR = data.emisor;

  loginBox.style.display = "none";
  app.style.display = "block";

  loadLists();
  loadAvisos();
}

// ================= LISTAS =================
async function loadLists() {

  const res = await fetch(API + "?action=listas");
  const data = await res.json();

  fill("maq", data.MAQUINA);
  fill("proy", data.PROYECTO);
  fill("tipo", data.AVERIA);
}

function fill(id, arr) {

  const sel = document.getElementById(id);
  sel.innerHTML = "";

  arr.forEach(v => {
    const o = document.createElement("option");
    o.value = v;
    o.text = v;
    sel.add(o);
  });
}

// ================= 🔴 FIX CLAVE: CREAR AVISO =================
async function crearAviso() {

  const url = https://script.google.com/macros/s/AKfycbx-xpq3eFe_TzggjI7u0ZG8crrpZZo_PZYhlquQGEParVor6VRnYpN0ngEz-b4r6ZU8/exec;

  url.searchParams.append("action", "crearAviso");
  url.searchParams.append("id", "AV-" + Date.now());
  url.searchParams.append("usuario", USER);
  url.searchParams.append("maquina", maq.value);
  url.searchParams.append("proyecto", proy.value);
  url.searchParams.append("tipo", tipo.value);
  url.searchParams.append("descripcion", desc.value);

  try {

    const res = await fetch(url.toString());
    const data = await res.json();

    if (!data.ok) {
      console.error(data);
      alert("Error creando aviso");
      return;
    }

    alert("Aviso creado correctamente");

    desc.value = "";
    loadAvisos();

  } catch (err) {
    console.error(err);
    alert("Error de conexión con el servidor");
  }
}

// ================= AVISOS =================
async function loadAvisos() {

  const res = await fetch(API + "?action=avisos");
  const data = await res.json();

  avisos.innerHTML = "";

  data.forEach(a => {

    avisos.innerHTML += `
      <div class="card">
        <b>${a.maquina}</b><br>
        ${a.descripcion}<br><br>

        <button onclick="rechazar('${a.row}')">Rechazar</button>
        <button onclick="convertir('${a.row}')">Convertir OT</button>
      </div>
    `;
  });
}

// ================= RECHAZAR =================
async function rechazar(row) {
  await fetch(API + "?action=rechazarAviso&row=" + row);
  loadAvisos();
}

// ================= CONVERTIR OT =================
async function convertir(row) {

  await fetch(API + "?action=crearOT&row=" + row + "&emisor=" + EMISOR);

  alert("OT creada");
  loadAvisos();
}

</script>

</body>
</html>
