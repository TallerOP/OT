<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión OT</title>

<style>
body{margin:0;font-family:Arial;background:url("op.png") center/cover fixed;}
.overlay{background:rgba(255,255,255,0.94);min-height:100vh;padding:15px;}
.container{max-width:500px;margin:auto;}

#loginBox{background:white;padding:20px;border-radius:12px;margin-top:40px;}

#app{display:none;}

input,select,textarea{width:100%;padding:10px;margin-top:5px;border-radius:8px;border:1px solid #ccc;box-sizing:border-box;}

button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;font-weight:bold;}

.aviso{background:#2e7d32;color:white;}
.ot{background:#1976d2;color:white;}
.del{background:#616161;color:white;}

.logout{width:auto;font-size:12px;background:#d32f2f;color:white;padding:6px 10px;border-radius:6px;border:none;}

.card{background:white;padding:10px;margin-top:10px;border-radius:10px;}
.header{display:flex;justify-content:space-between;align-items:center;}
</style>
</head>

<body>

<div class="overlay">
<div class="container">

<div id="loginBox">
<h2>Login</h2>
<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Entrar</button>
</div>

<div id="app">

<div class="header">
<h3>OT System</h3>
<button class="logout" onclick="logout()">Salir</button>
</div>

<label>Máquina</label>
<select id="maq"></select>

<label>Proyecto</label>
<select id="proy"></select>

<label>Tipo avería</label>
<select id="tipo"></select>

<label>Descripción</label>
<textarea id="desc"></textarea>

<button class="aviso" onclick="crearAviso()">Generar Aviso</button>
<button class="ot" onclick="irOT()">Generar OT</button>

<hr>

<div id="avisos"></div>

</div>

</div>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxKW2ayMcsmlFIUs76wjKDCnBHarYYT64GAky-Vw7eCSyba-yMR-GLe6hvyIYscxsUg/exec";

/* ================= LOGIN ================= */
async function login(){

const res = await fetch(`${API}?action=login&user=${user.value}&pass=${pass.value}`);
const data = await res.json();

if(!data.ok){
alert("Login incorrecto");
return;
}

localStorage.user=user.value;
localStorage.emisor=data.emisor;

loginBox.style.display="none";
app.style.display="block";

loadLists();
loadAvisos();
}

/* ================= LISTAS ================= */
async function loadLists(){
const res = await fetch(`${API}?action=listas`);
const d = await res.json();

maq.innerHTML = d.MAQUINA.map(x=>`<option>${x}</option>`).join("");
proy.innerHTML = d.PROYECTO.map(x=>`<option>${x}</option>`).join("");
tipo.innerHTML = d.AVERIA.map(x=>`<option>${x}</option>`).join("");
}

/* ================= AVISO ================= */
async function crearAviso(){

await fetch(API,{
method:"POST",
mode:"cors",
redirect:"follow",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
action:"crearAviso",
usuario:localStorage.user,
maquina:maq.value,
proyecto:proy.value,
tipo:tipo.value,
descripcion:desc.value
})
});

desc.value="";
loadAvisos();
}

/* ================= LOAD AVISOS ================= */
async function loadAvisos(){

const r = await fetch(`${API}?action=avisos`);
const d = await r.json();

avisos.innerHTML="";

d.forEach(a=>{
avisos.innerHTML+=`
<div class="card">
<b>${a.maquina}</b><br>${a.descripcion}
<button class="ot" onclick="convertir(${a.row})">Convertir a OT</button>
<button class="del" onclick="rechazar(${a.row})">Eliminar aviso</button>
</div>`;
});
}

/* ================= OT DIRECTO ================= */
function irOT(){

localStorage.tmp = JSON.stringify({
maq:maq.value,
proy:proy.value,
tipo:tipo.value,
desc:desc.value
});

location="ot.html";
}

/* ================= ACCIONES ================= */
async function convertir(row){

await fetch(`${API}?action=convertirAviso&row=${row}`,{
method:"GET",
mode:"cors",
redirect:"follow"
});

location="ot.html?row="+row;
}

async function rechazar(row){

await fetch(`${API}?action=rechazarAviso&row=${row}&user=${localStorage.user}`,{
method:"GET",
mode:"cors",
redirect:"follow"
});

loadAvisos();
}

function logout(){
localStorage.clear();
location.reload();
}

</script>

</body>
</html>
