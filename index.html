<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:url("op.png") center/cover no-repeat fixed;
}

.overlay{
background:rgba(255,255,255,0.94);
min-height:100vh;
padding:15px;
}

.container{
max-width:500px;
margin:auto;
}

/* LOGIN */
#loginBox{
background:white;
padding:20px;
border-radius:12px;
margin-top:40px;
}

/* INPUTS */
input,select,textarea{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:1px solid #ccc;
box-sizing:border-box;
}

/* BOTONES */
button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
font-weight:bold;
}

.btn-aviso{background:#2e7d32;color:white;}
.btn-ot{background:#1976d2;color:white;}
.btn-del{background:#616161;color:white;}

.logout{
width:auto;
background:#d32f2f;
color:white;
padding:6px 10px;
border-radius:6px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
}

.card{
background:white;
padding:10px;
margin-top:10px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="overlay">
<div class="container">

<!-- LOGIN -->
<div id="loginBox">
<h2>Login</h2>

<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div class="header">
<h3>Gestión OT</h3>
<button class="logout" onclick="logout()">Salir</button>
</div>

<label>Máquina</label>
<select id="maq"></select>

<label>Proyecto</label>
<select id="proy"></select>

<label>Tipo avería</label>
<select id="tipo"></select>

<label>Descripción</label>
<textarea id="desc"></textarea>

<button class="btn-aviso" onclick="crearAviso()">Generar Aviso</button>
<button class="btn-ot" onclick="irOT()">Generar OT</button>

<hr>

<div id="avisos"></div>

</div>

</div>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbybqjljMrf5r3oRViGn1-XW8WVXp3ujk7Zs6u_1UgyTwMs0K3O-Iw5qiawHuigfaE-a/exec";

/* 🔐 AUTOLOGIN */
window.onload=()=>{
if(localStorage.user){
loginAuto();
}
};

async function login(){

const r = await fetch(`${API}?action=login&user=${user.value}&pass=${pass.value}`);
const d = await r.json();

if(!d.ok){
alert("Login incorrecto");
return;
}

localStorage.user=user.value;
localStorage.emisor=d.emisor;

initApp();
}

async function loginAuto(){
const r = await fetch(`${API}?action=login&user=${localStorage.user}&pass=${localStorage.pass||""}`);
const d = await r.json();

if(d.ok){
initApp();
}
}

function initApp(){
loginBox.style.display="none";
app.style.display="block";
loadLists();
loadAvisos();
}

/* LISTAS */
async function loadLists(){
const r = await fetch(`${API}?action=listas`);
const d = await r.json();

maq.innerHTML=d.MAQUINA.map(x=>`<option>${x}</option>`).join("");
proy.innerHTML=d.PROYECTO.map(x=>`<option>${x}</option>`).join("");
tipo.innerHTML=d.AVERIA.map(x=>`<option>${x}</option>`).join("");
}

/* AVISO */
async function crearAviso(){

const p=new URLSearchParams();

p.append("action","crearAviso");
p.append("usuario",localStorage.user);
p.append("maquina",maq.value);
p.append("proyecto",proy.value);
p.append("tipo",tipo.value);
p.append("descripcion",desc.value);

await fetch(API,{method:"POST",body:p});

desc.value="";
loadAvisos();
}

/* AVISOS */
async function loadAvisos(){

const r = await fetch(`${API}?action=avisos`);
const d = await r.json();

avisos.innerHTML="";

d.forEach(a=>{
avisos.innerHTML+=`
<div class="card">
<b>${a.maquina}</b><br>${a.descripcion}
<button class="btn-ot" onclick="convertir(${a.row})">Convertir a OT</button>
<button class="btn-del" onclick="rechazar(${a.row})">Eliminar aviso</button>
</div>`;
});
}

function irOT(){
localStorage.tmp=JSON.stringify({
maq:maq.value,
proy:proy.value,
tipo:tipo.value,
desc:desc.value
});
location="ot.html";
}

async function convertir(r){
await fetch(`${API}?action=convertirAviso&row=${r}`);
location=`ot.html?row=${r}`;
}

async function rechazar(r){
await fetch(`${API}?action=rechazarAviso&row=${r}&user=${localStorage.user}`);
loadAvisos();
}

function logout(){
localStorage.clear();
location.reload();
}

</script>

</body>
</html>
