<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sistema OT - Login</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 400px;
      margin: 80px auto;
      text-align: center;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
    }

    button {
      padding: 10px 20px;
      cursor: pointer;
    }

    #msg {
      margin-top: 15px;
      color: red;
    }
  </style>
</head>

<body>

  <h2>Login Sistema OT</h2>

  <input id="user" placeholder="Usuario"><br>
  <input id="pass" type="password" placeholder="Contraseña"><br>

  <button onclick="login()">Entrar</button>

  <p id="msg"></p>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyfw5mqcyCBujW385mjh9kc8ciE0pKEuPcfMSINsLun0uW7fuI8QniOlIwH1-fKHDAI/exec";

async function login() {

  const user = document.getElementById("user").value.trim();
  const pass = document.getElementById("pass").value.trim();

  if (!user || !pass) {
    document.getElementById("msg").innerText = "Rellena usuario y contraseña";
    return;
  }

  try {

    const res = await fetch(API_URL);
    const text = await res.text();   // 🔥 clave para evitar errores
    const users = JSON.parse(text);

    console.log("Usuarios recibidos:", users);

    const found = users.find(u =>
      u.usuario === user &&
      u.password === pass
    );

    if (!found) {
      document.getElementById("msg").innerText = "Usuario o contraseña incorrectos";
      return;
    }

    if (found.activo !== "SI") {
      document.getElementById("msg").innerText = "Usuario desactivado";
      return;
    }

    // Guardar sesión
    localStorage.setItem("user", user);

    // Redirigir
    window.location.href = "app.html";

  } catch (err) {
    console.error(err);
    document.getElementById("msg").innerText =
      "Error conectando con el servidor";
  }
}

</script>

</body>
</html>
